name: Full BIMS Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Start backend server
        run: |
          cd backend
          python manage.py migrate
          nohup python manage.py runserver 0.0.0.0:8000 > ../backend.log 2>&1 &

      - name: Start frontend server
        run: |
          cd frontend
          nohup npm run dev -- --hostname 0.0.0.0 --port 3000 > ../frontend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8000/accounts/login/ > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..120}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          exit 1

      - name: Run full BIMS smoke suite
        run: bash scripts/smoke_full_bims.sh

      - name: Show server logs
        if: always()
        run: |
          echo "===== backend.log (tail) ====="
          tail -n 200 backend.log || true
          echo "===== frontend.log (tail) ====="
          tail -n 200 frontend.log || true
