<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resident Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f6f8fb; }
        .portal-navbar { background: #0b5ed7; }
        .portal-navbar .nav-link, .portal-navbar .navbar-brand { color: #fff !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg portal-navbar mb-4">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'resident_portal:dashboard' %}">Resident Portal</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#residentNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="residentNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'resident_portal:dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'resident_portal:profile' %}">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'resident_portal:requests' %}">Requests</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'resident_portal:announcements' %}">Announcements</a></li>
                </ul>
                {% if request.user.is_authenticated %}
                <form method="post" action="{% url 'resident_portal:logout' %}" class="d-flex">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'resident_portal:login' %}" class="btn btn-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
