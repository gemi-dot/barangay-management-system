<script>
(() => {
    const modalElement = document.getElementById('{{ modal_id }}');
    if (!modalElement) {
        return;
    }

    const deleteLabel = document.getElementById('{{ modal_target_id }}');
    const confirmButton = document.getElementById('{{ modal_confirm_id }}');
    const deleteModal = new bootstrap.Modal(modalElement);
    let activeForm = null;

    document.querySelectorAll('.{{ trigger_class }}').forEach((button) => {
        button.addEventListener('click', () => {
            activeForm = button.closest('form');
            if (!activeForm) {
                return;
            }

            deleteLabel.textContent = button.dataset.deleteLabel || '';
            deleteModal.show();
        });
    });

    confirmButton.addEventListener('click', () => {
        if (activeForm) {
            activeForm.submit();
        }
    });

    modalElement.addEventListener('hidden.bs.modal', () => {
        activeForm = null;
        deleteLabel.textContent = '';
    });
})();
</script>
