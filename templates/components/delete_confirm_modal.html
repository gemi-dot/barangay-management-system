<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_label_id }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="{{ modal_label_id }}">{{ modal_title|default:'Confirm Deletion' }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-2">{{ modal_message|default:'Are you sure you want to delete this record?' }}</p>
                <div class="small text-muted" id="{{ modal_target_id }}"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="{{ modal_confirm_id }}">{{ confirm_button_text|default:'Yes, Delete' }}</button>
            </div>
        </div>
    </div>
</div>
